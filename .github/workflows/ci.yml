name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Test (Linux, under xvfb for Electron)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: npm test
