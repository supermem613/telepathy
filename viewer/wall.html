<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>telepathy</title>
<link rel="stylesheet" href="/static/xterm.css?t={{TOKEN}}" />
<style>
  :root {
    --bg: #000000;          /* pure black — terminal area */
    --bg-2: #0a0a0a;        /* tabbar — subtly lifted from content */
    --bg-3: #141414;        /* inactive tab fill */
    --border: #1f1f1f;
    --border-soft: #161616;
    --border-active: #38bdf8;
    --fg: #d4d4d4;
    --fg-dim: #888888;
    --fg-strong: #f5f5f5;
    --accent: #38bdf8;
    --idle: #22c55e;        /* green — connected, no recent traffic */
    --busy: #f59e0b;        /* amber — frames flowing, command running */
    --offline: #ef4444;     /* red — disconnected / errored */
    --dim: #3a3a3a;         /* gray — never-connected placeholder */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font-family: ui-sans-serif, system-ui, sans-serif;
    overflow: hidden;
  }
  /* TABBAR — Chrome/Edge-style: dark bar, tabs sit on top with the
     active tab visually merging into the content area below. No bottom
     hairline — the contrast between tabbar bg (--bg-2) and content bg
     (--bg, pure black) provides the separation, and the active tab's
     pure-black fill reads as a continuous extension of the terminal. */
  #tabbar {
    display: flex; align-items: stretch;
    background: var(--bg-2);
    height: 40px; padding: 6px 8px 0 8px;
    user-select: none;
    gap: 4px;
  }
  /* #tabs is the inner row that holds the .tab elements. Without its
     own flex stretch, .tab children fall back to content height and
     leave a visible band of tabbar bg below them. */
  #tabs {
    display: flex; align-items: stretch;
    gap: 1px;
    min-width: 0;
  }
  .tab {
    display: flex; align-items: center; gap: 9px;
    padding: 0 10px 0 14px;
    cursor: pointer;
    font-size: 13px;
    color: var(--fg-dim);
    background: var(--bg-3);
    min-width: 150px; max-width: 240px;
    position: relative;
    border-radius: 8px 8px 0 0;
    transition: background 120ms, color 120ms;
  }
  .tab:hover { color: var(--fg-strong); background: #1c1c1c; }
  .tab.active {
    color: var(--fg-strong);
    background: var(--bg);
  }
  /* Cyan top accent bar on the active tab. */
  .tab.active::before {
    content: ""; position: absolute; left: 8px; right: 8px; top: 0;
    height: 2px; background: var(--accent); border-radius: 2px;
    box-shadow: 0 0 8px rgba(56,189,248,0.5);
  }
  .tab .label {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  /* Inline-rename editor — matches .label dimensions so the tab doesn't
     reflow when entering rename mode. */
  .tab .rename-input {
    flex: 1; min-width: 0;
    background: rgba(56,189,248,0.1);
    border: 1px solid var(--accent);
    border-radius: 3px;
    color: var(--fg-strong);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2px;
    padding: 1px 4px;
    outline: none;
  }
  .tab .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 200ms, box-shadow 200ms;
  }
  .tab.live .dot {
    background: var(--idle);
    box-shadow: 0 0 6px rgba(34,197,94,0.55);
  }
  .tab.live.busy .dot {
    background: var(--busy);
    box-shadow: 0 0 8px rgba(245,158,11,0.65);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .tab.offline .dot {
    background: var(--offline);
    box-shadow: 0 0 6px rgba(239,68,68,0.55);
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(0.85); box-shadow: 0 0 0 0 rgba(245,158,11,0); }
    50%      { opacity: 1.0; transform: scale(1.1);  box-shadow: 0 0 0 4px rgba(245,158,11,0.22); }
  }
  .tab .close {
    color: var(--fg-dim);
    width: 18px; height: 18px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; line-height: 1;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 120ms, background 120ms, color 120ms;
  }
  .tab:hover .close, .tab.active .close { opacity: 0.7; }
  .tab .close:hover { opacity: 1; background: rgba(239,68,68,0.2); color: #fca5a5; }
  /* Per-tab spawn-host icon. Sits between the label and the close button.
     Clicking it asks THIS tab's host machine to launch a sibling
     `telepathy host` in a new visible terminal window and auto-connects
     a fresh tab to it. Fades in on hover/active just like .close. */
  .tab .spawn {
    color: var(--fg-dim);
    width: 18px; height: 18px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 120ms, background 120ms, color 120ms;
  }
  .tab:hover .spawn, .tab.active .spawn { opacity: 0.7; }
  .tab .spawn:hover { opacity: 1; background: #1c1c1c; color: var(--accent); }
  .tab .spawn.busy { opacity: 1; color: var(--accent); animation: spawn-pulse 1s ease-in-out infinite; }
  @keyframes spawn-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .tab-add {
    display: flex; align-items: center; justify-content: center;
    width: 32px; cursor: pointer; color: var(--fg-dim);
    font-size: 18px; line-height: 1;
    border-radius: 6px 6px 0 0;
    transition: background 120ms, color 120ms;
  }
  .tab-add:hover { color: var(--accent); background: #1c1c1c; }
  /* Reload button on the top-right of the tabbar. Triggers
     location.reload() — which re-fetches wall.html and reconnects
     the browser-side WS sockets. Crucially, the wall HTTP+WS server
     and the orchestrator's peer TLS sockets ALL live in Electron's
     main process, NOT the renderer — so reloading the renderer does
     NOT disconnect peers. After the reload, refreshPeers() re-builds
     tabs from /api/peers (still authoritative). */
  #reload {
    margin-left: auto;
    display: flex; align-items: center; justify-content: center;
    width: 32px; cursor: pointer; color: var(--fg-dim);
    font-size: 16px; line-height: 1;
    border-radius: 6px 6px 0 0;
    transition: background 120ms, color 120ms, transform 400ms;
  }
  #reload:hover { color: var(--accent); background: #1c1c1c; }
  #reload:active { transform: rotate(180deg); }
  #content { position: relative; height: calc(100% - 40px); }
  .term-host {
    position: absolute; inset: 0;
    display: none;
    background: var(--bg);
  }
  .term-host.active { display: block; }

  /* xterm scrollbar — make it slim and theme-matched. The default
     browser scrollbar is bulky and bright. xterm renders inside
     .xterm-viewport which is what gets scrolled. */
  .xterm-viewport::-webkit-scrollbar { width: 8px; }
  .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
  .xterm-viewport::-webkit-scrollbar-thumb {
    background: #2a2a2a; border-radius: 4px;
  }
  .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  /* Hide the wall's own scrollbar (the browser viewport) — content is
     bounded and term has its own. */
  body::-webkit-scrollbar { display: none; }
  .empty {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-dim); text-align: center; padding: 40px;
    flex-direction: column; gap: 12px;
  }
  .empty button {
    padding: 8px 16px; border: 1px solid var(--border-active);
    background: transparent; color: var(--accent);
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .empty button:hover { background: rgba(56,189,248,0.1); }

  /* Connect dialog */
  .modal-bg {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 18px; width: 480px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .modal h2 { margin: 0 0 12px; font-size: 16px; color: var(--fg-strong); }
  .modal label { display: block; font-size: 12px; color: var(--fg-dim); margin-bottom: 4px; }
  .modal input {
    width: 100%; padding: 8px 10px; font-family: ui-monospace, monospace;
    background: var(--bg); color: var(--fg-strong);
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; margin-bottom: 12px;
  }
  .modal input:focus { outline: none; border-color: var(--border-active); }
  /* Token row: input + small inline Paste button on the right. */
  .modal .token-row {
    display: flex; gap: 6px; margin-bottom: 12px;
  }
  .modal .token-row input { margin: 0; flex: 1; min-width: 0; }
  .modal .paste-btn {
    flex-shrink: 0;
    padding: 0 12px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--fg-strong); border-radius: 4px;
    cursor: pointer; font-size: 12px;
    transition: background 120ms, border-color 120ms, color 120ms;
  }
  .modal .paste-btn:hover { background: #1c1c1c; border-color: var(--border-active); color: var(--accent); }
  .modal .row { display: flex; gap: 8px; justify-content: flex-end; }
  .modal button {
    padding: 6px 14px; border: 1px solid var(--border);
    background: var(--bg); color: var(--fg-strong);
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .modal button.primary { border-color: var(--border-active); color: var(--accent); }
  .modal button:hover { background: #11161f; }
  .modal .err { color: #fca5a5; font-size: 12px; margin-top: -8px; margin-bottom: 8px; min-height: 16px; }

  /* Toast */
  .toast {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: var(--bg-2); border: 1px solid var(--border-active);
    color: var(--fg-strong); padding: 8px 14px; border-radius: 4px;
    font-size: 13px; opacity: 0; transition: opacity 200ms;
    pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--offline); color: #fca5a5; }
</style>
</head>
<body>
<div id="tabbar">
  <div id="tabs"></div>
  <div class="tab-add" id="add-tab" title="Connect to a peer (Ctrl+T)">+</div>
  <div id="reload" title="Reload viewer (does not disconnect peers)">↻</div>
</div>
<div id="content">
  <div class="empty" id="empty">
    <div>📡 No peers connected.</div>
    <div style="font-size:12px">Paste a join token from a <code>telepathy host</code> session to add a tab.</div>
    <button id="empty-add">Connect a peer</button>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h2>Connect to a peer</h2>
    <label for="token-input">Join token (TLP1…)</label>
    <div class="token-row">
      <input id="token-input" placeholder="TLP1AAAAABBBBBCCCCCDDDDDEEEEE" autocomplete="off" spellcheck="false" />
      <button id="paste-btn" class="paste-btn" type="button" title="Paste from clipboard and connect">Paste and Go</button>
    </div>
    <div class="err" id="modal-err"></div>
    <div class="row">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-ok" class="primary">Connect</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/xterm.js?t={{TOKEN}}"></script>
<script src="/static/addon-unicode11.js?t={{TOKEN}}"></script>
<script src="/static/addon-fit.js?t={{TOKEN}}"></script>
<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const TOKEN = params.get("t") || "{{TOKEN}}";

  const $ = (id) => document.getElementById(id);
  const tabsEl = $("tabs");
  const contentEl = $("content");
  const emptyEl = $("empty");
  const modalBg = $("modal-bg");
  const tokenInput = $("token-input");
  const modalErr = $("modal-err");
  const toast = $("toast");

  // alias -> { tabEl, dotEl, labelEl, termHost, term, fit, ws, lastFrameAt, busyTimer, hasPty }
  const tabs = new Map();
  let activeAlias = null;

  // ---- helpers ----------------------------------------------------------

  function showToast(msg, isError) {
    toast.textContent = msg;
    toast.className = "toast show" + (isError ? " error" : "");
    setTimeout(() => { toast.className = "toast" + (isError ? " error" : ""); }, 2200);
  }
  function b64ToBytes(b64) {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) { out[i] = bin.charCodeAt(i); }
    return out;
  }
  // xterm.js auto-replies to terminal capability queries it sees in
  // incoming bytes (DA1, DA2, DSR cursor position, DSR status). When the
  // host's replay buffer contains a query the wrapped child sent earlier
  // (Copilot CLI, vim, etc. probe terminal type on startup), xterm
  // dutifully replies through onData. Forwarding that reply to the host's
  // PTY makes the wrapped child receive it as "user input" and echo it as
  // literal text — e.g. you see "[?1;2c" appear on screen on connect.
  // Strip those replies before forwarding. Real keystrokes never look
  // like these patterns; pasted ANSI escape sequences containing them
  // are an accepted edge case.
  function stripXtermReplies(s) {
    return s
      .replace(/\x1b\[\?[\d;]*c/g, "")  // DA1 reply: ESC[?1;2c, ESC[?6;22c, ...
      .replace(/\x1b\[>[\d;]*c/g, "")   // DA2 reply: ESC[>0;276;0c, ...
      .replace(/\x1b\[\d+;\d+R/g, "")   // DSR cursor position: ESC[24;80R
      .replace(/\x1b\[\d+n/g, "");      // DSR status: ESC[0n, ESC[3n
  }
  // Returns the user-selected substring of the xterm textarea, or "".
  // xterm.js populates textarea.value for accessibility/IME on focus — a
  // collapsed cursor (selectionStart === selectionEnd) is not a copy source.
  function getTextareaSelection(term) {
    const ta = term.textarea;
    if (!ta || !ta.value || ta.selectionStart === ta.selectionEnd) { return ""; }
    const s = Math.min(ta.selectionStart, ta.selectionEnd);
    const e = Math.max(ta.selectionStart, ta.selectionEnd);
    return ta.value.slice(s, e);
  }
  async function copyTerminalSelection(term) {
    const selection = term.getSelection() || window.getSelection().toString() || getTextareaSelection(term) || "";
    if (!selection) { return false; }
    let copied = false;
    if (term.textarea && typeof document.execCommand === "function") {
      try {
        term.textarea.value = selection;
        term.textarea.focus();
        term.textarea.select();
        copied = document.execCommand("copy");
      } catch {
        copied = false;
      }
    }
    // Clear copy-source state synchronously so the next right-click sees
    // clean state via hasTerminalCopySource.
    term.clearSelection();
    if (term.textarea) { term.textarea.value = ""; }
    window.getSelection().removeAllRanges();
    // Fall back to async clipboard API only when execCommand wasn't available.
    // Using both creates a race: the fire-and-forget writeText can land after
    // the next operation has already set a new clipboard value.
    if (!copied) {
      await navigator.clipboard.writeText(selection);
    }
    return true;
  }
  async function pasteIntoTerminal(term) {
    const text = await navigator.clipboard.readText();
    if (!text) { return false; }
    term.paste(text);
    return true;
  }
  function hasTerminalCopySource(term) {
    return term.hasSelection() || !!window.getSelection().toString() || !!getTextareaSelection(term);
  }
  function installTerminalClipboard(termHost, term) {
    term.attachCustomKeyEventHandler((event) => {
      if (event.type !== "keydown") { return true; }
      const key = event.key.toLowerCase();
      const isShortcut = event.ctrlKey || event.metaKey;
      if (!isShortcut || event.altKey || (key !== "c" && key !== "v")) { return true; }
      if (key === "c" && !hasTerminalCopySource(term)) { return true; }
      event.preventDefault();
      event.stopPropagation();
      (key === "c" ? copyTerminalSelection(term) : pasteIntoTerminal(term)).catch((err) => {
        showToast((key === "c" ? "Copy" : "Paste") + " failed: " + (err.message || err), true);
      });
      return false;
    });
    const clipboardTarget = term.element || termHost;
    const handleRightClick = (event) => {
      event.preventDefault();
      event.stopImmediatePropagation();
      const op = hasTerminalCopySource(term) ? copyTerminalSelection(term) : pasteIntoTerminal(term);
      op.catch((err) => showToast("Clipboard failed: " + (err.message || err), true));
    };
    clipboardTarget.addEventListener("contextmenu", handleRightClick, true);
    document.addEventListener("contextmenu", (event) => {
      if (termHost.contains(event.target)) { handleRightClick(event); }
    }, true);
  }
  async function api(method, path, body) {
    const r = await fetch(path + (path.includes("?") ? "&" : "?") + "t=" + encodeURIComponent(TOKEN), {
      method,
      headers: body ? { "Content-Type": "application/json" } : {},
      body: body ? JSON.stringify(body) : undefined,
    });
    const text = await r.text();
    let json;
    try { json = text ? JSON.parse(text) : {}; } catch (_) { json = { error: text }; }
    if (!r.ok) { throw new Error(json.error || ("HTTP " + r.status)); }
    return json;
  }

  // ---- modal ------------------------------------------------------------

  function openModal() {
    modalErr.textContent = "";
    tokenInput.value = "";
    modalBg.classList.add("show");
    setTimeout(() => tokenInput.focus(), 0);
  }
  function closeModal() { modalBg.classList.remove("show"); }
  $("add-tab").addEventListener("click", openModal);
  // Reload viewer — re-fetches wall.html and reconnects the browser-side
  // WS sockets. Wall server + peer TLS sockets live in Electron's MAIN
  // process and are unaffected; refreshPeers() will re-build tab state
  // on load.
  $("reload").addEventListener("click", () => location.reload());
  $("empty-add").addEventListener("click", openModal);
  $("modal-cancel").addEventListener("click", closeModal);

  // ---- spawn-host (per tab) ---------------------------------------------
  // Click handler for the per-tab ⎘ icon. Targets the tab's own peer (NOT
  // necessarily the active one) so the user can spawn from any visible
  // tab even while a different one has focus. Ignores re-clicks while a
  // spawn is already in flight on the same tab.
  async function spawnFromTab(targetAlias, spawnEl) {
    if (spawnEl.classList.contains("busy")) { return; }
    spawnEl.classList.add("busy");
    showToast("Spawning host on " + targetAlias + "…");
    try {
      const r = await api("POST", "/api/spawn-host/" + encodeURIComponent(targetAlias));
      await refreshPeers();
      activate(r.alias);
      showToast("Connected to " + r.alias);
    } catch (err) {
      showToast("Spawn-host failed: " + (err.message || err), true);
    } finally {
      spawnEl.classList.remove("busy");
    }
  }
  modalBg.addEventListener("click", (e) => { if (e.target === modalBg) { closeModal(); } });
  tokenInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { onModalOk(); }
    else if (e.key === "Escape") { closeModal(); }
  });
  $("modal-ok").addEventListener("click", onModalOk);
  $("paste-btn").addEventListener("click", async () => {
    // navigator.clipboard.readText() works inside Electron renderers
    // without extra perms (default policy), and on https/localhost in
    // browsers. Paste-and-Go: fill the input, then immediately trigger
    // the connect flow so the user doesn't need a second click.
    try {
      const text = await navigator.clipboard.readText();
      tokenInput.value = (text || "").trim();
      tokenInput.focus();
      modalErr.textContent = "";
      await onModalOk();
    } catch (err) {
      modalErr.textContent = "Paste failed: " + (err.message || err) + " — paste manually.";
    }
  });
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "t") { e.preventDefault(); openModal(); }
  });

  async function onModalOk() {
    const token = tokenInput.value.trim();
    if (!token) { modalErr.textContent = "Paste a token first."; return; }
    modalErr.textContent = "Connecting…";
    try {
      const r = await api("POST", "/api/connect", { token });
      modalErr.textContent = "";
      closeModal();
      await refreshPeers();
      activate(r.alias);
      showToast("Connected to " + r.alias);
    } catch (err) {
      modalErr.textContent = err.message || String(err);
    }
  }

  // ---- tabs -------------------------------------------------------------

  function createTab(peer) {
    // Set tabs.set FIRST then build everything, so partial failures
    // (e.g. xterm not loaded) don't leave orphan DOM behind that the
    // refresh loop would then try to recreate forever.
    let tab, dot, label, termHost, term, fit, ws, entry;
    try {
      tab = document.createElement("div");
      tab.className = "tab";
      tab.dataset.alias = peer.alias;
      dot = document.createElement("span"); dot.className = "dot";
      label = document.createElement("span"); label.className = "label";
      label.textContent = peer.alias + (peer.remoteAlias && peer.remoteAlias !== peer.alias ? " (" + peer.remoteAlias + ")" : "");
      label.title = "double-click to rename · " + (peer.remoteAddr || "");
      // Double-click to rename: swap the label for an inline <input>.
      // Enter / blur commits, Escape cancels. Rename is local-only (this
      // viewer session) — the underlying peer alias on the wire doesn't
      // change. Tracked separately on the entry as `displayName` so we
      // can keep using `peer.alias` as the routing key.
      label.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        startRename(peer.alias);
      });
      const close = document.createElement("span"); close.className = "close"; close.textContent = "✕";
      close.title = "Close tab (disconnect)";
      close.addEventListener("click", (e) => { e.stopPropagation(); closeTab(peer.alias); });
      const spawn = document.createElement("span"); spawn.className = "spawn"; spawn.textContent = "⎘";
      spawn.title = "Spawn another telepathy host on " + peer.alias + " and auto-connect";
      spawn.addEventListener("click", (e) => { e.stopPropagation(); spawnFromTab(peer.alias, spawn); });
      tab.append(dot, label, spawn, close);
      tab.addEventListener("click", () => activate(peer.alias));
      tabsEl.appendChild(tab);

      termHost = document.createElement("div");
      termHost.className = "term-host";
      contentEl.appendChild(termHost);

      if (typeof window.Terminal !== "function") {
        throw new Error("xterm.js failed to load (window.Terminal is undefined)");
      }
      term = new window.Terminal({
        fontSize: 16,
        fontFamily: '"CaskaydiaCove Nerd Font", "Cascadia Code NF", "Cascadia Code", "FiraCode Nerd Font", "FiraCode NF", "JetBrainsMono Nerd Font", "JetBrainsMono NF", "Hack Nerd Font", "MesloLGS NF", "Consolas", "Menlo", monospace',
        allowProposedApi: true,
        cursorBlink: true,
        // Don't gate stdin on hasPty: even peers without PTY mirroring
        // benefit from a focused, navigable terminal (selection, copy,
        // scrolling). The WS-forward step still gates by hasPty, so
        // typing into a no-PTY peer just no-ops on the wire.
        theme: { background: "#000000", foreground: "#d4d4d4" },
      });
      const unicode = new window.Unicode11Addon.Unicode11Addon();
      term.loadAddon(unicode);
      term.unicode.activeVersion = "11";
      fit = new window.FitAddon.FitAddon();
      term.loadAddon(fit);
      term.open(termHost);
      installTerminalClipboard(termHost, term);
      // NOTE: termHost is display:none until activate() is called. We
      // intentionally don't fit() here — fit against a hidden element
      // returns garbage dimensions (~80x24 default) and would tell the
      // host's PTY to size for a non-existent viewport, leaving Copilot
      // CLI's bottom-anchored prompt drawn off-screen. The real fit
      // happens in activate() once termHost is .active.

      ws = new WebSocket(`${location.origin.replace("http", "ws")}/ws/${encodeURIComponent(peer.alias)}?t=${encodeURIComponent(TOKEN)}`);
      entry = {
        tab, dot, label, termHost, term, fit, ws,
        lastFrameAt: 0, busyTimer: null, hasPty: peer.hasPty, alias: peer.alias,
        lastSentCols: 0, lastSentRows: 0,
      };
      // Click anywhere on the term host (including the empty area below
      // the prompt) re-focuses xterm. Without this, click → focus moves
      // to the host div, leaving xterm's inner textarea unfocused, and
      // keystrokes go nowhere.
      termHost.addEventListener("mousedown", () => {
        try { term.focus(); } catch (_) {}
      });
      function sendResizeNow() {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const cols = term.cols, rows = term.rows;
        // Filter bogus sizes from hidden-element fits — fitting against
        // display:none returns garbage (~80x24 default) and would push
        // the wrong size to the host's PTY.
        if (!cols || !rows || cols < 10 || rows < 4) return;
        if (cols === entry.lastSentCols && rows === entry.lastSentRows) return;
        entry.lastSentCols = cols;
        entry.lastSentRows = rows;
        try { ws.send(JSON.stringify({ type: "resize", cols, rows })); } catch (_) { /* ignore */ }
        // Clear visible content + scrollback WITHOUT resetting terminal
        // modes. `term.reset()` (RIS) wipes alt-screen/focus/mouse state
        // and drops alt-screen TUIs (Copilot CLI, vim, etc.) into the
        // main buffer where every redraw scrolls instead of overwriting.
        // \x1b[2J = erase screen, \x1b[3J = erase scrollback,
        // \x1b[H = cursor home. Mode state untouched.
        try { term.write("\x1b[2J\x1b[3J\x1b[H"); } catch (_) { /* ignore */ }
        // Nudge: send the same size again ~250ms later. Some TUIs
        // (Copilot CLI, vim, anything that draws tables / boxes via
        // absolute positioning) only repaint on receipt of a SIGWINCH;
        // when the wall is mid-resize-drag, the host sees a flurry of
        // sizes and may suppress the repaint until things settle. The
        // second send is a no-op for sizing (same cols/rows) but the
        // redundant SIGWINCH triggers a clean repaint at the final size.
        // Debounced so a long drag doesn't fire dozens of nudges.
        if (entry.nudgeTimer) clearTimeout(entry.nudgeTimer);
        entry.nudgeTimer = setTimeout(() => {
          entry.nudgeTimer = null;
          if (!ws || ws.readyState !== WebSocket.OPEN) return;
          // Re-send WITHOUT the lastSentCols/Rows guard — that's the
          // whole point of the nudge: poke the host even when our local
          // state thinks "nothing changed".
          try { ws.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows })); } catch (_) { /* ignore */ }
        }, 250);
      }
      entry.sendResizeNow = sendResizeNow;
      ws.onopen = () => {
        tab.classList.add("live");
        // If the tab is already active when WS opens, fit + send now.
        // (Common case: first tab — refreshPeers called createTab then
        // activate before WS connected.)
        if (termHost.classList.contains("active")) {
          try { fit.fit(); } catch (_) {}
          sendResizeNow();
        }
      };
      // Subsequent xterm resizes (window resize, tab activation re-fit)
      // get forwarded too, so the PTY stays in lockstep.
      term.onResize(sendResizeNow);
      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === "frame") {
          term.write(b64ToBytes(msg.data));
          markBusy(entry);
        } else if (msg.type === "resize") {
          // Host's PTY resized (e.g. another viewer triggered it).
          // We don't currently re-fit our xterm; just record the size.
        } else if (msg.type === "error") {
          term.write("\r\n\x1b[31m[telepathy] " + msg.message + "\x1b[0m\r\n");
          tab.classList.remove("live"); tab.classList.add("offline");
        }
      };
      ws.onclose = () => {
        tab.classList.remove("live", "busy"); tab.classList.add("offline");
      };
      // Always wire input. The server-side orchestrator already drops
      // pty_input frames when no local PTY exists, so this is safe even
      // for peers whose hasPty was reported false (e.g. when the wall
      // tab was created DURING the host's hold-for-keypress phase, before
      // setLocalPty had fired). Once the host's shell spawns, frames
      // start arriving AND keystrokes start flowing — no need to detect
      // the capability flip on the client.
      term.onData((data) => {
        const filtered = stripXtermReplies(data);
        if (!filtered) { return; }
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "input", data: filtered }));
        }
      });
      tabs.set(peer.alias, entry);
      return entry;
    } catch (err) {
      // Cleanup any partially-built DOM so refresh doesn't re-create endlessly.
      try { tab && tab.remove(); } catch (_) {}
      try { termHost && termHost.remove(); } catch (_) {}
      try { ws && ws.close(); } catch (_) {}
      try { term && term.dispose(); } catch (_) {}
      showToast("createTab failed: " + (err.message || err), true);
      console.error("[telepathy/wall] createTab failed:", err);
      // Mark this alias as failed so we don't retry every refresh.
      tabs.set(peer.alias, { tab: null, ws: null, term: null, fit: null, alias: peer.alias, failed: true });
      return null;
    }
  }

  function markBusy(entry) {
    entry.lastFrameAt = Date.now();
    entry.tab.classList.add("busy");
    if (entry.busyTimer) { clearTimeout(entry.busyTimer); }
    // Idle = no frame received for 800ms.
    entry.busyTimer = setTimeout(() => { entry.tab.classList.remove("busy"); }, 800);
  }

  function activate(alias) {
    activeAlias = alias;
    for (const [a, t] of tabs) {
      const isActive = a === alias;
      t.tab.classList.toggle("active", isActive);
      t.termHost.classList.toggle("active", isActive);
      if (isActive && t.term) {
        // Defer fit + focus to next frame so the display:none → block
        // transition has had a chance to land in layout. Calling focus()
        // on a freshly-displayed element doesn't always take. After fit
        // settles we explicitly forward the resize to the host (xterm's
        // onResize doesn't always fire if dimensions look unchanged from
        // its perspective even though the host is stuck at a stale size).
        //
        // Skip term.focus() if this tab currently has an inline rename
        // <input> mounted: a dblclick on the label fires two `click`s
        // first (each calling activate → scheduling this RAF), THEN the
        // dblclick (which mounts the rename input synchronously). By the
        // time this RAF runs, the input is in the DOM. Calling
        // term.focus() here would synchronously blur the rename input,
        // and the input's blur listener would commit the unchanged
        // prefill — making rename appear to never open at all.
        requestAnimationFrame(() => {
          try { t.fit.fit(); } catch (_) {}
          try { t.sendResizeNow && t.sendResizeNow(); } catch (_) {}
          if (t.tab.querySelector("input.rename-input")) { return; }
          try { t.term.focus(); } catch (_) {}
        });
      }
    }
    if (alias) { emptyEl.style.display = "none"; }
  }

  // Pick the alias to focus after `closedAlias` disappears: the nearest
  // still-alive tab to the left in insertion order, or the nearest to
  // the right if there's nothing left. `aliasOrderBeforeClose` is the
  // tabs.keys() snapshot taken BEFORE the tab was removed.
  function pickPreviousTab(closedAlias, aliasOrderBeforeClose) {
    const idx = aliasOrderBeforeClose.indexOf(closedAlias);
    if (idx < 0) { return tabs.keys().next().value || null; }
    for (let i = idx - 1; i >= 0; i--) {
      if (tabs.has(aliasOrderBeforeClose[i])) { return aliasOrderBeforeClose[i]; }
    }
    for (let i = idx + 1; i < aliasOrderBeforeClose.length; i++) {
      if (tabs.has(aliasOrderBeforeClose[i])) { return aliasOrderBeforeClose[i]; }
    }
    return null;
  }

  async function closeTab(alias) {
    const entry = tabs.get(alias);
    if (!entry) { return; }
    const aliasOrderBeforeClose = Array.from(tabs.keys());
    try { entry.ws.close(); } catch (_) {}
    try { entry.term.dispose(); } catch (_) {}
    entry.tab.remove();
    entry.termHost.remove();
    tabs.delete(alias);
    try { await api("POST", "/api/disconnect/" + encodeURIComponent(alias)); } catch (_) {}
    if (activeAlias === alias) {
      const next = pickPreviousTab(alias, aliasOrderBeforeClose);
      if (next) { activate(next); }
      else { activeAlias = null; emptyEl.style.display = "flex"; }
    }
  }

  // ---- rename ----------------------------------------------------------

  // Local-only rename: swap the .label span for an <input>. Enter or
  // blur commits the new text into entry.displayName (and into
  // label.textContent on commit). Escape cancels. The peer's wire alias
  // is unchanged — this is a viewer-side cosmetic only.
  function startRename(alias) {
    const entry = tabs.get(alias);
    if (!entry || !entry.label) return;
    const oldText = entry.label.textContent;
    const input = document.createElement("input");
    input.type = "text";
    input.className = "label rename-input";
    input.value = oldText;
    input.spellcheck = false;
    input.autocomplete = "off";
    entry.label.replaceWith(input);
    // Keep clicking the input from re-activating / re-firing dblclick
    // navigation. Selection happens after focus so the user can type
    // immediately to overwrite.
    input.addEventListener("click", (e) => e.stopPropagation());
    input.addEventListener("dblclick", (e) => e.stopPropagation());
    input.focus();
    input.select();
    // The dblclick that brought us here was preceded by two `click`s,
    // each of which called activate(), and activate() schedules
    // `term.focus()` in a requestAnimationFrame. Without this, the
    // queued RAFs run after our synchronous input.focus() above and
    // steal focus back to the terminal — typing then goes to the PTY
    // instead of the rename input, and the user thinks rename "isn't
    // working". Re-focusing inside our own RAF puts us at the back of
    // the same queue so we win the race.
    requestAnimationFrame(() => {
      try { input.focus(); input.select(); } catch (_) {}
    });
    let done = false;
    const commit = (newText) => {
      if (done) return;
      done = true;
      const finalText = (newText ?? oldText).trim() || oldText;
      const span = document.createElement("span");
      span.className = "label";
      span.textContent = finalText;
      span.title = "double-click to rename";
      span.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        startRename(alias);
      });
      input.replaceWith(span);
      entry.label = span;
      entry.displayName = finalText;
    };
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); commit(input.value); }
      else if (e.key === "Escape") { e.preventDefault(); commit(oldText); }
    });
    input.addEventListener("blur", () => commit(input.value));
  }

  // ---- discovery / refresh ---------------------------------------------

  async function refreshPeers() {
    const r = await api("GET", "/api/peers");
    const aliases = new Set(r.peers.map((p) => p.alias));
    // Add missing tabs (peers connected outside this UI).
    for (const peer of r.peers) {
      if (!tabs.has(peer.alias)) {
        const entry = createTab(peer);
        if (entry && !activeAlias) {
          activate(peer.alias);
        }
      }
    }
    // Drop tabs whose peers are gone. If the active tab itself was
    // reaped (e.g. user typed `exit` in the shell, host process died,
    // peer disconnected), focus the nearest surviving tab to the left
    // — same UX as manual close. Without this, the wall ends up with
    // no active tab and the user has to click one manually.
    const aliasOrderBeforeReap = Array.from(tabs.keys());
    const activeWasReaped = activeAlias != null && !aliases.has(activeAlias);
    for (const a of aliasOrderBeforeReap) {
      if (!aliases.has(a)) {
        const entry = tabs.get(a);
        try { entry.ws.close(); } catch (_) {}
        try { entry.term.dispose(); } catch (_) {}
        entry.tab.remove();
        entry.termHost.remove();
        tabs.delete(a);
      }
    }
    if (activeWasReaped) {
      const next = pickPreviousTab(activeAlias, aliasOrderBeforeReap);
      if (next) { activate(next); }
      else { activeAlias = null; }
    }
    if (tabs.size === 0) { emptyEl.style.display = "flex"; }
  }

  await refreshPeers();
  // Periodically sync (cheap; just compares peer lists).
  setInterval(refreshPeers, 5000);

  window.addEventListener("resize", () => {
    for (const t of tabs.values()) {
      if (!t.fit || !t.termHost) continue;
      // Only fit visible terms — fitting a hidden one returns garbage.
      if (!t.termHost.classList.contains("active")) continue;
      try { t.fit.fit(); } catch (_) {}
      try { t.sendResizeNow && t.sendResizeNow(); } catch (_) {}
    }
  });

  // Focus restoration. After alt-tab away+back, the BrowserWindow has
  // keyboard focus but xterm's hidden textarea may not — keystrokes go
  // nowhere. Re-grab focus on every window-focus event AND on any
  // keydown that lands outside xterm. The keydown path is the safety
  // net for cases where the focus event doesn't fire (focus shifted
  // while window was hidden, OS-level focus weirdness, etc.).
  function focusActiveTerm() {
    if (!activeAlias) return;
    const t = tabs.get(activeAlias);
    if (!t || !t.term) return;
    // Don't steal focus from an open rename input on this tab — same
    // reasoning as in activate(): the rename's blur listener would
    // commit immediately, eating the user's edit.
    if (t.tab && t.tab.querySelector("input.rename-input")) return;
    try { t.term.focus(); } catch (_) { /* ignore */ }
  }
  window.addEventListener("focus", focusActiveTerm);
  // Capture-phase keydown so we see EVERY key, including ones xterm
  // would have absorbed if it were focused. If the active term doesn't
  // already have focus, grab it AND replay the key on xterm's textarea
  // so it isn't swallowed. Without the replay, single-action keys like
  // Escape (vim mode switch, TUI menu cancel) are silently lost on the
  // first press after a focus change.
  document.addEventListener("keydown", (e) => {
    if (e.key === "Control" || e.key === "Alt" || e.key === "Shift" || e.key === "Meta") return;
    const tag = (e.target && e.target.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;
    if (!activeAlias) return;
    const t = tabs.get(activeAlias);
    if (!t || !t.term || !t.termHost) return;
    // Already focused? Nothing to do.
    if (t.termHost.contains(document.activeElement)) return;
    e.preventDefault();
    e.stopPropagation();
    try { t.term.focus(); } catch (_) { /* ignore */ }
    // Replay the key on xterm's textarea so xterm processes it.
    const ta = t.term.textarea;
    if (ta) {
      ta.dispatchEvent(new KeyboardEvent(e.type, {
        key: e.key, code: e.code, keyCode: e.keyCode, which: e.which,
        ctrlKey: e.ctrlKey, altKey: e.altKey, shiftKey: e.shiftKey,
        metaKey: e.metaKey, repeat: e.repeat,
        bubbles: true, cancelable: true,
      }));
    }
  }, true);
})();
</script>
</body>
</html>
