<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>telepathy attach</title>
<link rel="stylesheet" href="/static/xterm.css?t={{TOKEN}}" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #000000; color: #d4d4d4; font-family: ui-sans-serif, system-ui, sans-serif; }
  header { padding: 6px 10px; background: #0a0a0a; border-bottom: 1px solid #1f1f1f; font-size: 13px; display: flex; gap: 12px; align-items: center; }
  header .alias { font-weight: 600; color: #e5e7eb; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
  header .hint { margin-left: auto; color: #94a3b8; font-size: 12px; }
  #term-host { height: calc(100% - 32px); padding: 6px; display: flex; align-items: flex-end; overflow: hidden; }
  #term-host .xterm { width: 100%; }
  .xterm-viewport::-webkit-scrollbar { width: 8px; }
  .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
  .xterm-viewport::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
  .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  body::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<header>
  <span class="dot"></span>
  <span class="alias" id="alias">…</span>
  <span class="hint">live PTY mirror · click and type to send keystrokes</span>
</header>
<div id="term-host"></div>
<script src="/static/xterm.js?t={{TOKEN}}"></script>
<script src="/static/addon-unicode11.js?t={{TOKEN}}"></script>
<script src="/static/addon-fit.js?t={{TOKEN}}"></script>
<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const TOKEN = params.get("t") || "{{TOKEN}}";
  const alias = decodeURIComponent(location.pathname.replace("/peer/", ""));
  document.getElementById("alias").textContent = alias;
  const term = new window.Terminal({
    fontSize: 16,
    fontFamily: '"CaskaydiaCove Nerd Font", "Cascadia Code NF", "Cascadia Code", "FiraCode Nerd Font", "FiraCode NF", "JetBrainsMono Nerd Font", "JetBrainsMono NF", "Hack Nerd Font", "MesloLGS NF", "Consolas", "Menlo", monospace',
    allowProposedApi: true,
    cursorBlink: true,
    theme: { background: "#000000", foreground: "#d4d4d4" },
  });
  const unicode = new window.Unicode11Addon.Unicode11Addon();
  term.loadAddon(unicode);
  term.unicode.activeVersion = "11";
  const fit = new window.FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(document.getElementById("term-host"));
  fit.fit();
  const ws = new WebSocket(`${location.origin.replace("http", "ws")}/ws/${encodeURIComponent(alias)}?t=${encodeURIComponent(TOKEN)}`);
  let sentInitialResize = false;
  function sendResize() {
    if (ws.readyState !== WebSocket.OPEN) return;
    try { ws.send(JSON.stringify({ type: "resize", cols: term.cols, rows: term.rows })); } catch (_) { /* ignore */ }
    sentInitialResize = true;
  }
  ws.onopen = () => {};
  term.onResize(sendResize);
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "frame") {
      term.write(b64ToBytes(msg.data));
      if (!sentInitialResize) {
        sendResize();
      }
    } else if (msg.type === "resize") {
      try { term.resize(msg.cols, msg.rows); } catch (_) {}
    } else if (msg.type === "error") {
      term.write(`\\r\\n\\x1b[31m[telepathy] ${msg.message}\\x1b[0m\\r\\n`);
    }
  };
  function b64ToBytes(b64) {
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  // See wall.html for rationale — strip xterm.js auto-replies to DA1/DA2
  // queries and DSR responses so they don't get forwarded to the host's
  // PTY as "user input" and echoed as literal text on screen.
  function stripXtermReplies(s) {
    return s
      .replace(/\x1b\[\?[\d;]*c/g, "")
      .replace(/\x1b\[>[\d;]*c/g, "")
      .replace(/\x1b\[\d+;\d+R/g, "")
      .replace(/\x1b\[\d+n/g, "");
  }
  // Returns the user-selected substring of the xterm textarea, or "".
  // xterm.js populates textarea.value for accessibility/IME on focus — a
  // collapsed cursor (selectionStart === selectionEnd) is not a copy source.
  function getTextareaSelection() {
    const ta = term.textarea;
    if (!ta || !ta.value || ta.selectionStart === ta.selectionEnd) { return ""; }
    const s = Math.min(ta.selectionStart, ta.selectionEnd);
    const e = Math.max(ta.selectionStart, ta.selectionEnd);
    return ta.value.slice(s, e);
  }
  async function copyTerminalSelection() {
    const selection = term.getSelection() || window.getSelection().toString() || getTextareaSelection() || "";
    if (!selection) { return false; }
    if (term.textarea) {
      term.textarea.value = selection;
      term.textarea.focus();
      term.textarea.select();
      document.execCommand("copy");
    }
    // Clear copy-source state synchronously — execCommand("copy") already
    // captured the text. Deferring cleanup past the async writeText creates
    // a race where the next right-click sees stale textarea.value via
    // hasTerminalCopySource and takes the copy path instead of paste.
    term.clearSelection();
    if (term.textarea) { term.textarea.value = ""; }
    window.getSelection().removeAllRanges();
    await navigator.clipboard.writeText(selection);
    return true;
  }
  async function pasteIntoTerminal() {
    const text = await navigator.clipboard.readText();
    if (!text) { return false; }
    term.paste(text);
    return true;
  }
  function hasTerminalCopySource() {
    return term.hasSelection() || !!window.getSelection().toString() || !!getTextareaSelection();
  }
  term.attachCustomKeyEventHandler((event) => {
    if (event.type !== "keydown") { return true; }
    const key = event.key.toLowerCase();
    const isShortcut = event.ctrlKey || event.metaKey;
    if (!isShortcut || event.altKey || (key !== "c" && key !== "v")) { return true; }
    if (key === "c" && !hasTerminalCopySource()) { return true; }
    event.preventDefault();
    event.stopPropagation();
    (key === "c" ? copyTerminalSelection() : pasteIntoTerminal()).catch((err) => {
      term.write(`\r\n\x1b[31m[telepathy] ${key === "c" ? "Copy" : "Paste"} failed: ${err.message || err}\x1b[0m\r\n`);
    });
    return false;
  });
  const clipboardTarget = term.element || document.getElementById("term-host");
  const handleRightClick = (event) => {
    event.preventDefault();
    event.stopImmediatePropagation();
    const op = hasTerminalCopySource() ? copyTerminalSelection() : pasteIntoTerminal();
    op.catch((err) => term.write(`\r\n\x1b[31m[telepathy] Clipboard failed: ${err.message || err}\x1b[0m\r\n`));
  };
  clipboardTarget.addEventListener("contextmenu", handleRightClick, true);
  document.addEventListener("contextmenu", (event) => {
    if (document.getElementById("term-host").contains(event.target)) { handleRightClick(event); }
  }, true);
  term.onData((data) => {
    const filtered = stripXtermReplies(data);
    if (!filtered) return;
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "input", data: filtered }));
    }
  });
  window.addEventListener("resize", () => { try { fit.fit(); } catch (_) {} });
})();
</script>
</body>
</html>
